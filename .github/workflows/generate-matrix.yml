name: Generate Matrix

on:
  workflow_call:
    outputs:
      versions:
        description: The build matrix versions
        value: ${{ jobs.generate-matrix.outputs.versions }}

jobs:
  generate-matrix:
    name: Generate build matrix
    runs-on: ubuntu-latest
    outputs:
      versions: ${{ steps.generate.outputs.versions }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 2

      - name: Setup bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Generate build matrix
        run: bun run generate-matrix
        id: generate

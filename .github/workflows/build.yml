name: Docker Image CI/CD

on:
  push:
    branches: [main]
    paths: [dkcutter.json, "scripts/**", "template/**", versions.json]
  schedule:
    - cron: "0 0 * * 1"
  workflow_dispatch:

jobs:
  tests:
    uses: ./.github/workflows/tests.yml

  generate-extension-templates:
    name: Generate Extension Templates
    runs-on: ubuntu-latest
    needs: tests
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Setup bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Generate Extension Templates
        run: bun run generate-extensions

      - name: Commit and Push changes
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: "chore(templates): auto-generate extension directories"
          file_pattern: "with-extensions/** with-extensions-older/**"

  generate-matrix:
    name: Generate build matrix
    runs-on: ubuntu-latest
    needs: tests
    outputs:
      versions: ${{ steps.generate.outputs.versions }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - name: Setup bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Generate build matrix
        run: bun run generate-matrix
        id: generate

  build:
    name: Build Postgres ${{ matrix.postgres_version }}
    runs-on: ubuntu-latest
    needs: generate-matrix
    permissions:
      contents: read
      packages: write
      id-token: write

    strategy:
      matrix:
        include: ${{ fromJSON(needs.generate-matrix.outputs.versions) }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Setup bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Generate Dockerfile
        run: bun run generate -y -f --postgresVersion ${{ matrix.postgres_version }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags and labels) for Docker
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
        with:
          images: ghcr.io/${{ github.repository }}
          # Defining this makes sure the org.opencontainers.image.version OCI label becomes the actual release version and not the branch name
          tags: |
            type=raw,value=latest,enable=${{ matrix.is_latest }}
            type=raw,value=${{ matrix.postgres_version }},priority=1000
            type=match,pattern=^(\d+)\..*,group=1,value=${{ matrix.postgres_version }}

      - name: Build local image for testing
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.postgres_version }}
          load: true
          tags: postgres-test:${{ matrix.postgres_version }}
          cache-from: type=gha

      - name: Run Integration Tests
        run: bash ./tests/test-docker.sh ${{ matrix.postgres_version }}

      - name: Run Extension Integration Tests
        if: ${{ matrix.extension_template != '' }}
        run: bash ./tests/test-docker-extensions.sh ${{ matrix.postgres_version }} ${{ matrix.extension_template }}

      - name: Build and Push image
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.postgres_version }}
          platforms: ${{ join(matrix.platforms) }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

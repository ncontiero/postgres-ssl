name: Docker Image CI/CD

on:
  push:
    branches: [main]
    paths: [dkcutter.json, "scripts/**", "templates/**"]
  schedule:
    - cron: "0 0 * * 1"
  workflow_dispatch:

jobs:
  check-code:
    name: Check Code - CI
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Setup bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Check Code
        run: bun run check

  generate-matrix:
    name: Generate build matrix
    runs-on: ubuntu-latest
    needs: check-code
    outputs:
      versions: ${{ steps.generate.outputs.versions }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - name: Setup bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Generate build matrix
        run: bun run generate-matrix
        id: generate

  build:
    name: Build Postgres ${{ matrix.version }}
    runs-on: ubuntu-latest
    needs: generate-matrix
    permissions:
      contents: read
      packages: write
      id-token: write

    strategy:
      matrix:
        include: ${{ fromJSON(needs.generate-matrix.outputs.versions) }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Setup bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Generate Dockerfile
        run: bun run generate -y -f --postgresVersion ${{ matrix.version }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags and labels) for Docker
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}
          # Defining this makes sure the org.opencontainers.image.version OCI label becomes the actual release version and not the branch name
          tags: |
            type=raw,value=latest,enable=${{ matrix.is_latest }}
            type=raw,value=${{ matrix.version }},priority=1000
            type=match,pattern=^(\d+)\..*,group=1,value=${{ matrix.version }}

      - name: Build and Push image
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.version }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

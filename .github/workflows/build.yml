name: Docker Image CI/CD

on:
  push:
    branches: [main]
    paths: [dkcutter.json, "scripts/**", "template/**", versions.json]
  schedule:
    - cron: "0 0 * * 1"
  workflow_dispatch:

jobs:
  tests:
    uses: ./.github/workflows/tests.yml

  generate-matrix:
    uses: ./.github/workflows/generate-matrix.yml

  build:
    name: Build Postgres ${{ matrix.postgres_version }}
    runs-on: ubuntu-latest
    needs: generate-matrix
    permissions:
      contents: read
      packages: write
      id-token: write

    strategy:
      matrix:
        include: ${{ fromJSON(needs.generate-matrix.outputs.versions) }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0

      - name: Install dependencies
        run: bun install

      - name: Generate Dockerfile
        run: bun run generate -y -f --postgresVersion ${{ matrix.postgres_version }}

      - name: Generate Extension Template
        if: ${{ matrix.extension_template != '' }}
        run: |
          bun run generate -y -f \
            --postgresVersion ${{ matrix.postgres_version }} \
            --outputImageSlug ${{ matrix.extension_template }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4.1.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Login to GitHub Container Registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags and labels) for Docker
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
        with:
          images: ghcr.io/${{ github.repository }}
          # Defining this makes sure the org.opencontainers.image.version OCI label becomes the actual release version and not the branch name
          tags: |
            type=raw,value=latest,enable=${{ matrix.is_latest }}
            type=raw,value=${{ matrix.postgres_version }},priority=1000
            type=match,pattern=^(\d+)\..*,group=1,value=${{ matrix.postgres_version }}

      - name: Build local image for testing
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: ${{ matrix.postgres_version }}
          load: true
          tags: postgres-test:${{ matrix.postgres_version }}
          cache-from: type=gha

      - name: Build local image with extension for testing
        if: ${{ matrix.extension_template != '' }}
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: ${{ matrix.extension_template }}
          load: true
          tags: postgres-test:${{ matrix.postgres_version }}-extensions
          build-args: |
            POSTGRES_VERSION=${{ matrix.postgres_version }}
            PG_APT_PACKAGES=postgresql-${{ matrix.postgres_major_version }}-postgis-3
            PG_DB_EXTENSIONS=postgis
          cache-from: type=gha

      - name: Run Integration Tests
        run: bash ./tests/test-docker.sh ${{ matrix.postgres_version }}

      - name: Run Extension Integration Tests
        if: ${{ matrix.extension_template != '' }}
        run: |
          bash ./tests/test-docker-extensions.sh \
            ${{ matrix.postgres_version }} ${{ matrix.postgres_major_version }}

      - name: Build and Push image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: ${{ matrix.postgres_version }}
          platforms: ${{ join(matrix.platforms) }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  commit-extensions:
    name: Commit Generated Extensions
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0

      - name: Install dependencies
        run: bun install

      - name: Generate all Extension Templates
        run: bun run generate-extensions

      - name: Commit and Push Extension Templates
        uses: stefanzweifel/git-auto-commit-action@04702edda442b2e678b25b537cec683a1493fcb9 # v7.1.0
        with:
          commit_message: "chore(template): auto-generate extension directories"
          file_pattern: "with-extensions/** with-extensions-older/**"
